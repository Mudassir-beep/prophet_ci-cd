name: CI/CD — Travel Prophet Forecaster

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Run Tests (CI)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: ⚙️ Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 🧪 Run Tests
        run: |
          pytest tests/ -v

  deploy:
    name: 🚀 Deploy to Hugging Face (CD)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🔧 Configure Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions Bot"

      - name: 🤗 Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add huggingface https://muddasser:$HF_TOKEN@huggingface.co/spaces/muddasser/ci_cd_prophet
          git push huggingface main --force

      - name: ✅ Deployment Complete
        run: echo "🎉 Deployed to HuggingFace!"
```

